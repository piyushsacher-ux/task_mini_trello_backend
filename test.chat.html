<!DOCTYPE html>
<html>
<head>
  <title>Project Chat Test</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    input {
      padding: 6px;
      margin: 5px 0;
      width: 400px;
    }

    button {
      padding: 6px 12px;
      margin-top: 5px;
      cursor: pointer;
    }

    #chatBox {
      margin-top: 20px;
      border: 1px solid #ccc;
      height: 300px;
      overflow-y: auto;
      padding: 10px;
    }

    .message {
      margin-bottom: 8px;
    }

    .error {
      color: red;
    }

    .system {
      color: green;
    }
  </style>
</head>
<body>

  <h2>Project Chat Test</h2>

  <div>
    <label>JWT Token:</label><br>
    <input type="text" id="token" placeholder="Paste JWT here" />
  </div>

  <div>
    <label>Project ID:</label><br>
    <input type="text" id="projectId" placeholder="Paste Project ID here" />
  </div>

  <button onclick="connectSocket()">Connect</button>

  <hr>

  <div id="chatSection" style="display:none;">
    <input type="text" id="messageInput" placeholder="Type message..." />
    <button onclick="sendMessage()">Send</button>

    <div id="chatBox"></div>
  </div>

  <script>
    let socket;
    let currentProjectId;

    function addMessage(text, type = "message") {
      const chatBox = document.getElementById("chatBox");
      const div = document.createElement("div");
      div.className = type;
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function connectSocket() {
      const token = document.getElementById("token").value;
      const projectId = document.getElementById("projectId").value;

      if (!token || !projectId) {
        alert("Token and Project ID required");
        return;
      }

      currentProjectId = projectId;

      socket = io("http://localhost:3000", {
        auth: { token }
      });

      socket.on("connect", () => {
        addMessage("Connected to server", "system");

        // Join project room
        socket.emit("joinProject", projectId);
      });

      socket.on("joinedProject", (data) => {
        addMessage("Joined project chat", "system");
        document.getElementById("chatSection").style.display = "block";
      });

      socket.on("receiveMessage", (message) => {
        addMessage(
          `${message.sender} : ${message.content}`,
          "message"
        );
      });

      socket.on("chatError", (error) => {
        console.log(error.message);
        addMessage("Error: " + error.message, "error");
      });

      socket.on("disconnect", () => {
        addMessage("Disconnected", "error");
      });
    }

    function sendMessage() {
      const input = document.getElementById("messageInput");
      const content = input.value;

      if (!content) return;

      socket.emit("sendMessage", {
        projectId: currentProjectId,
        content: content
      });

      input.value = "";
    }
  </script>

</body>
</html>
